<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pangolin - Guitar Fretboard Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet"/>

<style>
/* (TUTTO IL TUO CSS INVARIATO) */
html, body { margin: 0; padding: 0; height: 100%; font-family: 'Open Sans', sans-serif; }
#controls { display: flex; flex-wrap: wrap; gap: 1rem; padding: 1rem; background:#E6E6F7;}
#controls label { display:flex; flex-direction:column; font-size:0.9rem; }
#fretboard { width:100%; }
</style>
</head>

<body>

<section id="controls">
<label>Root Note<select id="key-select"></select></label>
<label>Scale<select id="scale-select"></select></label>
<label>Strings<select id="strings-select"></select></label>
<div id="tunings"></div>
</section>

<svg id="fretboard"></svg>

<script>
const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const scales = {
  'Major': [0,2,4,5,7,9,11],
  'Minor': [0,2,3,5,7,8,10]
};

/* ====== TUNING ====== */
const defaultTunings = {
  6:['E','A','D','G','B','E'],
  7:['B','E','A','D','G','B','E'],
  8:['E','B','E','A','D','G','B','E']
};

const defaultOctaves = {
  6:[2,2,3,3,3,4],
  7:[1,2,2,3,3,3,4],
  8:[1,1,2,2,3,3,3,4]
};

const keySelect = document.getElementById('key-select');
const scaleSelect = document.getElementById('scale-select');
const stringsSelect = document.getElementById('strings-select');
const tuningsDiv = document.getElementById('tunings');
const svg = document.getElementById('fretboard');

let state = {
  key:'E',
  scale:'Minor',
  strings:8,
  tuning:[],
  octaves:[],
  scaleNotes:[],
  frets:24
};

function init(){
  notes.forEach(n=> keySelect.innerHTML += `<option>${n}</option>`);
  Object.keys(scales).forEach(s=> scaleSelect.innerHTML += `<option>${s}</option>`);
  [6,7,8].forEach(n=> stringsSelect.innerHTML += `<option>${n}</option>`);

  keySelect.value = state.key;
  scaleSelect.value = state.scale;
  stringsSelect.value = state.strings;

  keySelect.onchange = update;
  scaleSelect.onchange = update;
  stringsSelect.onchange = updateStrings;

  updateStrings();
}

/* ====== STRINGS ====== */
function updateStrings(){
  state.strings = +stringsSelect.value;
  tuningsDiv.innerHTML = '';

  for(let i=0;i<state.strings;i++){
    const idx = state.strings-1-i;

    const label = document.createElement('label');

    const noteSel = document.createElement('select');
    notes.forEach(n=> noteSel.innerHTML += `<option>${n}</option>`);

    const octSel = document.createElement('select');
    for(let o=0;o<=8;o++){
      octSel.innerHTML += `<option>${o}</option>`;
    }

    noteSel.value = defaultTunings[state.strings][idx];
    octSel.value = defaultOctaves[state.strings][idx];

    noteSel.onchange = update;
    octSel.onchange = update;

    label.appendChild(noteSel);
    label.appendChild(octSel);
    tuningsDiv.appendChild(label);
  }

  update();
}

/* ====== UPDATE ====== */
function update(){
  const selects = Array.from(tuningsDiv.querySelectorAll('select'));

  state.tuning = [];
  state.octaves = [];

  for(let i=0;i<selects.length;i+=2){
    state.tuning.push(selects[i].value);
    state.octaves.push(parseInt(selects[i+1].value));
  }

  computeScale();
  drawFretboard();
}

/* ====== SCALE ====== */
function computeScale(){
  const rootIdx = notes.indexOf(state.key);
  state.scaleNotes = scales[state.scale].map(i => notes[(rootIdx+i)%12]);
}

/* ====== DRAW ====== */
function drawFretboard(){
  const W = svg.clientWidth;
  const H = 200;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const S = state.strings;
  const F = state.frets;
  const seg = W/(F+1);

  svg.innerHTML='';

  state.tuning.forEach((open,i)=>{
    const openIdx = notes.indexOf(open);
    const baseOct = state.octaves[i];
    const y = (i+1)*H/(S+1);

    for(let f=0;f<=F;f++){
      const noteIndex = openIdx + f;
      const note = notes[noteIndex % 12];
      const octave = baseOct + Math.floor(noteIndex/12);

      if(!state.scaleNotes.includes(note)) continue;

      const cx = (f+0.5)*seg;

      const c = document.createElementNS(svg.namespaceURI,'circle');
      c.setAttribute('cx',cx);
      c.setAttribute('cy',y);
      c.setAttribute('r',10);
      c.setAttribute('fill','#D8BFD8');
      svg.appendChild(c);

      const t = document.createElementNS(svg.namespaceURI,'text');
      t.setAttribute('x',cx);
      t.setAttribute('y',y+4);
      t.setAttribute('text-anchor','middle');

      t.textContent = note;

      const sup = document.createElementNS(svg.namespaceURI,'tspan');
      sup.textContent = octave;
      sup.setAttribute('baseline-shift','super');
      sup.setAttribute('font-size','0.6em');

      t.appendChild(sup);
      svg.appendChild(t);
    }
  });
}

window.onload = init;
</script>

</body>
</html>
